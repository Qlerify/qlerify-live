<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Replaced at runtime by app.js (loadMeta) with the live model's title. -->
    <title>Qlerify Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --row-changed: rgba(250, 204, 21, 0.45);
        --row-changed-border: rgb(202, 138, 4);
      }
      html, body {
        font-family: "Inter", system-ui, sans-serif;
        background: linear-gradient(180deg, #fafaf9 0%, #f5f5f4 100%);
        height: 100%;
      }
      .mono { font-family: "JetBrains Mono", ui-monospace, monospace; }
      .row-changed {
        background: var(--row-changed) !important;
        border-left: 3px solid var(--row-changed-border);
        animation: flash 1.3s ease-out;
      }
      @keyframes flash {
        0% { background: rgba(250, 204, 21, 0.85); }
        100% { background: var(--row-changed); }
      }
      /* A single field whose value changed since the last event. Pill-shaped so
         it reads as "this value, specifically" rather than the whole row. */
      .field-changed {
        background: var(--row-changed) !important;
        box-shadow: inset 0 0 0 1px var(--row-changed-border);
        border-radius: 4px;
        animation: flash 1.3s ease-out;
      }
      /* Vertical guide for a nested child aggregate under its parent row. */
      .entity-nest { border-left: 2px solid #e7e5e4; }
      .panel { transition: box-shadow 0.2s ease; }
      .panel.active { box-shadow: 0 0 0 2px rgba(234, 179, 8, 0.5); }
    </style>
  </head>
  <body class="text-stone-900">
    <div id="app" class="min-h-screen flex flex-col"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
